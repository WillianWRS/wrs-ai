spring:
  application:
    name: ai

  datasource:
    url: jdbc:postgresql://localhost:5432/ai
    username: ai
    password: ai

  ai:
    chat:
      client:
        tool-calling:
          enabled: false
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        embedding:
          api-key: ${GOOGLE_API_KEY}
        chat:
          model: gemini-2.0-flash
          enable-cached-content: false
    vectorstore:
      pgvector:
        initialize-schema: true