services:
  api:
    build: .
    container_name: wrs-ai-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${GOOGLE_API_KEY}

